services:

  postgres:

    image: postgres:17-alpine

    container_name: autoparts-postgres

    restart: unless-stopped

    environment:

      POSTGRES_DB: autoparts

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: postgres


    ports:

      - "5432:5432"


    volumes:

      - postgres_data:/var/lib/postgresql/data


    healthcheck:

      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d autoparts"
        ]

      interval: 10s

      timeout: 5s

      retries: 5


    networks:

      - autoparts-network



  redis:

    image: redis:7-alpine

    container_name: autoparts-redis

    restart: unless-stopped


    ports:

      - "6379:6379"


    volumes:

      - redis_data:/data


    healthcheck:

      test:
        [
          "CMD",
          "redis-cli",
          "ping"
        ]

      interval: 10s

      timeout: 5s

      retries: 5


    networks:

      - autoparts-network



volumes:

  postgres_data:

  redis_data:



networks:

  autoparts-network:

    driver: bridge