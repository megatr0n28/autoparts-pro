services:

  frontend:

    build:
      context: ./frontend
    container_name: autoparts-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"

    environment:
      VITE_API_URL: http://localhost:8080/api/v1

    depends_on:
      - api
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:5173 >/dev/null || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - autoparts-network
  postgres:

    image: postgres:17-alpine

    container_name: autoparts-postgres

    restart: unless-stopped

    environment:

      POSTGRES_DB: autoparts

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: postgres


    ports:

      - "5432:5432"


    volumes:

      - postgres_data:/var/lib/postgresql/data


    healthcheck:

      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d autoparts"
        ]

      interval: 10s

      timeout: 5s

      retries: 10


    networks:

      - autoparts-network



  redis:

    image: redis:7-alpine

    container_name: autoparts-redis

    restart: unless-stopped


    ports:

      - "6379:6379"


    volumes:

      - redis_data:/data


    healthcheck:

      test:
        [
          "CMD",
          "redis-cli",
          "ping"
        ]

      interval: 10s

      timeout: 5s

      retries: 10


    networks:

      - autoparts-network



  api:

    build:

      context: ./backend


    container_name: autoparts-api


    restart: unless-stopped


    ports:

      - "8080:8080"


    environment:

      APP_ENV: development

      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: autoparts
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_SSLMODE: disable

      REDIS_HOST: redis
      REDIS_PORT: 6379

      JWT_SECRET: development-secret
      JWT_EXPIRATION: "15m"
      JWT_REFRESH_EXPIRATION: "720h"


    depends_on:

      postgres:

        condition: service_healthy


      redis:

        condition: service_healthy


    healthcheck:

      test:
        [
          "CMD",
          "wget",
          "--spider",
          "-q",
          "http://localhost:8080/api/v1/health"
        ]

      interval: 10s

      timeout: 5s

      retries: 10


    networks:

      - autoparts-network



volumes:

  postgres_data:

  redis_data:



networks:

  autoparts-network:

    driver: bridge