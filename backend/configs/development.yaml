app:
  name: AutoParts Pro API
  environment: development
  port: 8080

log:
  level: debug

database:
  host: localhost
  port: 5432
  name: autoparts
  user: postgres
  password: postgres
  sslmode: disable

  max_idle_conns: 10

  max_open_conns: 100

  max_lifetime: 30

redis:
  host: localhost
  port: 6379

jwt:
  secret: development-secret
  expiration: "15m"
  refresh_expiration: "720h"